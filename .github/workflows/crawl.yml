name: Crawl & Update RSS Feeds

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "crawler/**"
      - "feeds.json"
      - "package.json"
      - ".github/workflows/crawl.yml"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Crawl blogs
        run: npm run crawl

      - name: Build RSS feeds
        run: npm run build

      - name: Commit and push changes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "chore: update RSS feeds [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          fi
